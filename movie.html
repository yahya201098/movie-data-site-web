<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.name }} | MovieFlix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #e50914;
            --primary-hover: #b20710;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Effet de halo lumineux en arrière-plan */
            background: radial-gradient(circle at top right, #2c0505 0%, #0a0a0a 60%);
        }

        /* --- NAVBAR --- */
        .navbar {
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo {
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            text-decoration: none;
        }

        /* --- MOVIE SECTION --- */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .movie-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Décoration subtile */
        .movie-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .header-section h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 204, 0, 0.1);
            color: #ffcc00;
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }

        /* --- INFO GRID --- */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin: 20px 0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .label {
            color: #777;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.05rem;
            color: #eee;
        }

        .cast-section {
            border-top: 1px solid var(--glass-border);
            padding-top: 25px;
        }

        /* --- BUTTONS --- */
        .actions {
            margin-top: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2);
        }

        .back-btn:hover {
            background: var(--primary-hover);
            transform: translateX(-5px);
            box-shadow: 0 15px 25px rgba(229, 9, 20, 0.3);
        }

        /* Animation d'entrée */
        .movie-card {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .movie-card { padding: 30px; }
            .header-section h1 { font-size: 2rem; }
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/" class="logo">Movie<span>Flix</span></a>
</div>

<div class="container">
    <div class="movie-card">

        <div class="header-section">
            <div class="rating-badge">★ {{ movie.rating }}</div>
            <h1>{{ movie.name }}</h1>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="label">Année</span>
                <span class="value">{{ movie.year }}</span>
            </div>
            <div class="info-item">
                <span class="label">Genre</span>
                <span class="value">{{ movie.genre }}</span>
            </div>
            <div class="info-item">
                <span class="label">Durée</span>
                <span class="value">{{ movie.run_time }} min</span>
            </div>
            <div class="info-item">
                <span class="label">Box Office</span>
                <span class="value" style="color: #4ade80;">{{ movie.box_office }}</span>
            </div>
        </div>

        <div class="cast-section">
            <div class="info-item" style="margin-bottom: 20px;">
                <span class="label">Réalisateur</span>
                <span class="value">{{ movie.directors }}</span>
            </div>
            <div class="info-item">
                <span class="label">Acteurs Principaux</span>
                <span class="value">{{ movie.casts }}</span>
            </div>
        </div>

        <div class="actions">
            <a href="/" class="back-btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour aux films
            </a>
        </div>

    </div>
</div>

</body>
</html>
